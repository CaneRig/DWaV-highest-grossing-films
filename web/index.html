<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Analytics Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --accent-blue: #00d4ff;
            --text-color: #e0e0e0;
            --border-color: #222;
            --input-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-container { margin-bottom: 30px; display: flex; gap: 10px; }
        button {
            background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue);
            padding: 10px 20px; cursor: pointer; border-radius: 4px; transition: 0.3s; font-weight: 600;
        }
        button:hover, button.active { background: var(--accent-blue); color: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }

        .view-section { width: 95%; max-width: 1200px; display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s ease-out; }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- STABLE TABLE STYLING --- */
        .table-wrapper { 
            background: var(--card-bg); 
            border-radius: 8px; 
            border: 1px solid var(--border-color);
            min-height: 600px; /* Freezes height to prevent jumping */
            overflow-x: auto;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* Prevents column width from shifting */
            min-width: 1000px; 
        }

        th { background: #161616; color: var(--accent-blue); padding: 12px; text-align: left; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--border-color); }
        
        /* Column Width Definitions */
        .col-title { width: 25%; }
        .col-year { width: 10%; }
        .col-dir { width: 20%; }
        .col-box { width: 25%; }
        .col-country { width: 20%; }

        .sort-header { cursor: pointer; user-select: none; }
        .sort-header:hover { background: #1a1a1a; color: #fff; }

        .filter-row td { background: #0f0f0f; padding: 10px; border-bottom: 2px solid var(--accent-blue); vertical-align: top; }
        .filter-input, .filter-select { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 6px; border-radius: 3px; outline: none; }

        /* Slider Controls */
        .range-slider { position: relative; width: 100%; height: 25px; margin-top: 5px; }
        .range-slider input[type="range"] { position: absolute; width: 100%; appearance: none; background: none; pointer-events: none; z-index: 2; }
        .range-slider::before { content: ''; position: absolute; width: 100%; height: 4px; background: #333; top: 10px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--accent-blue); cursor: pointer; appearance: none; pointer-events: auto; box-shadow: 0 0 8px #00d4ff; }
        .range-values { font-size: 0.7rem; color: var(--accent-blue); display: flex; justify-content: space-between; margin-bottom: 2px; font-family: monospace; }

        td { padding: 14px 12px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr:hover td { background: rgba(0, 212, 255, 0.03); }
    </style>
</head>
<body>

    <h1 style="color: var(--accent-blue); letter-spacing: 2px; text-align: center;">CINEMA DATA ENGINE</h1>

    <div class="nav-container">
        <button onclick="switchView('table-view')" id="btn-table-view" class="active">Data Explorer</button>
        <button onclick="switchView('chart-view')" id="btn-chart-view">Analytics</button>
    </div>

    <div id="table-view" class="view-section active">
        <div class="table-wrapper">
            <table id="movieTable">
                <thead>
                    <tr>
                        <th class="col-title sort-header" onclick="sortTable('title')">Title ↕</th>
                        <th class="col-year sort-header" onclick="sortTable('release_year')">Year ↕</th>
                        <th class="col-dir sort-header" onclick="sortTable('director')">Director ↕</th>
                        <th class="col-box sort-header" onclick="sortTable('box_office')">Box Office Revenue ↕</th>
                        <th class="col-country sort-header" onclick="sortTable('country')">Country ↕</th>
                    </tr>
                    <tr class="filter-row">
                        <td><input type="text" id="f-title" class="filter-input" placeholder="Search..." onkeyup="filterData()"></td>
                        <td><select id="f-year" class="filter-select" onchange="filterData()"><option value="">All Years</option></select></td>
                        <td><input type="text" id="f-director" class="filter-input" placeholder="Filter..." onkeyup="filterData()"></td>
                        <td>
                            <div class="range-values">
                                <span id="v-min">$0</span>
                                <span id="v-max">$0</span>
                            </div>
                            <div class="range-slider">
                                <input type="range" id="f-slider-min" oninput="handleSlider('min')">
                                <input type="range" id="f-slider-max" oninput="handleSlider('max')">
                            </div>
                        </td>
                        <td><select id="f-country" class="filter-select" onchange="filterData()"><option value="">All Countries</option></select></td>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chart-view" class="view-section">
        <canvas id="mainChart" height="100"></canvas>
    </div>

    <script>
        let movieData = [];
        let filteredData = [];
        let sortDirection = 1;
        let currentSortCol = '';
        let chartInstance = null;
        let absMin = 0, absMax = 0;

        async function loadData() {
            try {
                const response = await fetch('/films.json');
                const raw = await response.json();
                movieData = Array.isArray(raw) ? raw : (raw.movies || []);
                
                movieData = movieData.map(m => ({
                    ...m,
                    director: typeof m.director === 'string' && m.director.startsWith('[') 
                              ? JSON.parse(m.director).join(', ') : m.director
                }));

                const offices = movieData.map(m => m.box_office);
                absMin = Math.min(...offices) - 10;
                absMax = Math.max(...offices) + 10;

                setupSliders();
                populateDropdowns();
                filterData();
                initChart();
            } catch (e) { console.error("Fetch error:", e); }
        }

        function setupSliders() {
            const sMin = document.getElementById('f-slider-min');
            const sMax = document.getElementById('f-slider-max');
            sMin.min = sMax.min = absMin;
            sMin.max = sMax.max = absMax;
            sMin.value = absMin;
            sMax.value = absMax;
            updateSliderLabels();
        }

        function handleSlider(type) {
            const sMin = document.getElementById('f-slider-min');
            const sMax = document.getElementById('f-slider-max');
            if (parseFloat(sMin.value) >= parseFloat(sMax.value)) {
                if (type === 'min') sMin.value = parseFloat(sMax.value) - 1;
                else sMax.value = parseFloat(sMin.value) + 1;
            }
            updateSliderLabels();
            filterData();
        }

        function updateSliderLabels() {
            document.getElementById('v-min').innerText = '$' + parseInt(document.getElementById('f-slider-min').value).toLocaleString();
            document.getElementById('v-max').innerText = '$' + parseInt(document.getElementById('f-slider-max').value).toLocaleString();
        }

        function filterData() {
            const titleQuery = document.getElementById('f-title').value.toLowerCase();
            const directorQuery = document.getElementById('f-director').value.toLowerCase();
            const yearQuery = document.getElementById('f-year').value;
            const countryQuery = document.getElementById('f-country').value;
            const minVal = parseFloat(document.getElementById('f-slider-min').value);
            const maxVal = parseFloat(document.getElementById('f-slider-max').value);

            filteredData = movieData.filter(m => {
                return m.title.toLowerCase().includes(titleQuery) &&
                       m.director.toLowerCase().includes(directorQuery) &&
                       (yearQuery === "" || m.release_year.toString() === yearQuery) &&
                       (countryQuery === "" || m.country === countryQuery) &&
                       (m.box_office >= minVal && m.box_office <= maxVal);
            });

            renderTable();
            if (chartInstance) updateChart();
        }

        function sortTable(column) {
            sortDirection = (currentSortCol === column) ? sortDirection * -1 : 1;
            currentSortCol = column;
            filteredData.sort((a, b) => {
                let valA = a[column], valB = b[column];
                if (typeof valA === 'string') return valA.localeCompare(valB) * sortDirection;
                return (valA - valB) * sortDirection;
            });
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            body.innerHTML = filteredData.map(m => `
                <tr>
                    <td title="${m.title}" style="font-weight:600">${m.title}</td>
                    <td>${m.release_year}</td>
                    <td title="${m.director}">${m.director}</td>
                    <td style="color:var(--accent-blue); font-weight:bold">$${m.box_office.toLocaleString()}</td>
                    <td>${m.country}</td>
                </tr>
            `).join('');
        }

        function populateDropdowns() {
            const years = [...new Set(movieData.map(m => m.release_year))].sort((a,b) => b-a);
            const countries = [...new Set(movieData.map(m => m.country))].sort();
            years.forEach(y => document.getElementById('f-year').innerHTML += `<option value="${y}">${y}</option>`);
            countries.forEach(c => document.getElementById('f-country').innerHTML += `<option value="${c}">${c}</option>`);
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-container button').forEach(b => b.classList.remove('active'));
            const active = document.getElementById(viewId);
            active.style.display = 'block';
            setTimeout(() => active.classList.add('active'), 50);
            document.getElementById('btn-' + viewId).classList.add('active');
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: getChartData(),
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#222' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888' } }
                    }
                }
            });
        }

        function updateChart() {
            chartInstance.data = getChartData();
            chartInstance.update();
        }

        function getChartData() {
            const displayData = filteredData.slice(0, 15);
            return {
                labels: displayData.map(m => m.title),
                datasets: [{
                    data: displayData.map(m => m.box_office),
                    backgroundColor: 'rgba(0, 212, 255, 0.5)',
                    borderColor: '#00d4ff',
                    borderWidth: 2
                }]
            };
        }

        window.onload = loadData;
    </script>
</body>
</html>
