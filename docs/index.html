<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Analytics Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --accent-blue: #00d4ff;
            --text-color: #e0e0e0;
            --border-color: #222;
            --input-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-container { margin-bottom: 20px; display: flex; gap: 10px; }
        button {
            background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue);
            padding: 10px 20px; cursor: pointer; border-radius: 4px; transition: 0.3s; font-weight: 600;
        }
        button:hover, button.active { background: var(--accent-blue); color: #000; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }

        .master-container { width: 95%; max-width: 1200px; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
        
        /* Fixed Header & Filters */
        .fixed-header-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .fixed-header-table th { background: #161616; color: var(--accent-blue); padding: 12px; text-align: left; font-size: 0.75rem; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .filter-row td { background: #0f0f0f; padding: 10px; border-bottom: 2px solid var(--accent-blue); }
        .filter-input, .filter-select { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 6px; border-radius: 3px; font-family: inherit; font-size: 0.8rem; outline: none; }

        .range-slider { position: relative; width: 100%; height: 25px; margin-top: 5px; }
        .range-slider input[type="range"] { position: absolute; width: 100%; appearance: none; background: none; pointer-events: none; z-index: 2; }
        .range-slider::before { content: ''; position: absolute; width: 100%; height: 4px; background: #333; top: 10px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--accent-blue); cursor: pointer; appearance: none; pointer-events: auto; }
        .range-values { font-size: 0.7rem; color: var(--accent-blue); display: flex; justify-content: space-between; font-family: monospace; }

        /* Content Sections */
        .view-content { padding: 20px; display: none; opacity: 0; }
        .view-content.active { display: block; opacity: 1; }

        #table-body-view { padding: 0; }
        .data-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .data-table td { padding: 14px 12px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-color); }

        #analytics-view.active { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .chart-box { background: #0a0a0a; padding: 15px; border-radius: 6px; border: 1px solid #222; }

        .metrics-sidebar { background: #161616; padding: 20px; border-radius: 6px; border-left: 2px solid var(--accent-blue); }
        .metric-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .metric-label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .metric-value { font-size: 1.1rem; color: #fff; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

    <h1 style="color: var(--accent-blue); letter-spacing: 2px; margin-bottom: 10px;">CINEMA DATA ENGINE</h1>

    <div class="nav-container">
        <button onclick="switchView('table-body-view')" id="btn-table-body-view" class="active">Data Explorer</button>
        <button onclick="switchView('analytics-view')" id="btn-analytics-view">Analytics Intelligence</button>
    </div>

    <div class="master-container">
        <table class="fixed-header-table">
            <thead>
                <tr>
                    <th style="width:25%" onclick="sortTable('title')">Title ↕</th>
                    <th style="width:10%" onclick="sortTable('release_year')">Year ↕</th>
                    <th style="width:20%" onclick="sortTable('director')">Director ↕</th>
                    <th style="width:25%" onclick="sortTable('box_office')">Box Office Revenue ↕</th>
                    <th style="width:20%" onclick="sortTable('country')">Country ↕</th>
                </tr>
                <tr class="filter-row">
                    <td><input type="text" id="f-title" class="filter-input" placeholder="Search..." onkeyup="filterData()"></td>
                    <td><select id="f-year" class="filter-select" onchange="filterData()"><option value="">All</option></select></td>
                    <td><input type="text" id="f-director" class="filter-input" placeholder="Filter..." onkeyup="filterData()"></td>
                    <td>
                        <div class="range-values"><span id="v-min">$0</span><span id="v-max">$0</span></div>
                        <div class="range-slider">
                            <input type="range" id="f-slider-min" oninput="handleSlider('min')">
                            <input type="range" id="f-slider-max" oninput="handleSlider('max')">
                        </div>
                    </td>
                    <td><select id="f-country" class="filter-select" onchange="filterData()"><option value="">All</option></select></td>
                </tr>
            </thead>
        </table>

        <div id="table-body-view" class="view-content active">
            <table class="data-table"><tbody id="tableBody"></tbody></table>
        </div>

        <div id="analytics-view" class="view-content">
            <div class="charts-grid">
                <div class="chart-box"><canvas id="barChart"></canvas></div>
                <div class="chart-box">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                        <span style="font-size:0.7rem; color:#888">Country Distribution</span>
                        <select id="country-metric" style="background:#000; color:var(--accent-blue); border:1px solid #333; font-size:0.7rem; font-family: inherit;" onchange="updateCharts()">
                            <option value="count">Film Count</option>
                            <option value="avg">Average Revenue</option>
                            <option value="median">Median Revenue</option>
                            <option value="min">Min Revenue</option>
                            <option value="max">Max Revenue</option>
                        </select>
                    </div>
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="chart-box full-width"><canvas id="lineChart" height="70"></canvas></div>
            </div>
            <div class="metrics-sidebar">
                <div class="metric-item"><div class="metric-label">Sum Revenue</div><div class="metric-value" id="m-sum">$0</div></div>
                <div class="metric-item"><div class="metric-label">Mean</div><div class="metric-value" id="m-mean">$0</div></div>
                <div class="metric-item"><div class="metric-label">Median</div><div class="metric-value" id="m-median">$0</div></div>
                <div class="metric-item"><div class="metric-label">Max</div><div class="metric-value" id="m-max">$0</div></div>
                <div class="metric-item" style="border:0"><div class="metric-label">Count</div><div class="metric-value" id="m-count">0</div></div>
            </div>
        </div>
    </div>

    <script>
        // Register the DataLabels plugin for all charts
        Chart.register(ChartDataLabels);

        let movieData = [], filteredData = [], charts = { bar: null, pie: null, line: null };
        let absMin = 0, absMax = 0, currentSort = { col: '', dir: 1 };

        async function loadData() {
            try {
                const res = await fetch('https://canerig.github.io/DWaV-highest-grossing-films/films.json');
                const raw = await res.json();
                movieData = (Array.isArray(raw) ? raw : (raw.movies || [])).map(m => ({
                    ...m,
                    director: typeof m.director === 'string' && m.director.startsWith('[') ? JSON.parse(m.director).join(', ') : m.director
                }));
                const b = movieData.map(m => m.box_office);
                absMin = Math.min(...b) - 10; absMax = Math.max(...b) + 10;
                setupUI();
                initCharts();
                filterData(); // This handles the first table render and chart update
            } catch (e) { console.error(e); }
        }

        function setupUI() {
            const sMin = document.getElementById('f-slider-min'), sMax = document.getElementById('f-slider-max');
            sMin.min = sMax.min = absMin; sMin.max = sMax.max = absMax;
            sMin.value = absMin; sMax.value = absMax;
            const years = [...new Set(movieData.map(m => m.release_year))].sort((a,b) => b-a);
            const countries = [...new Set(movieData.map(m => m.country))].sort();
            years.forEach(y => document.getElementById('f-year').innerHTML += `<option value="${y}">${y}</option>`);
            countries.forEach(c => document.getElementById('f-country').innerHTML += `<option value="${c}">${c}</option>`);
            updateSliderLabels();
        }

        function switchView(id) {
            document.querySelectorAll('.nav-container button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if (id === 'analytics-view') {
                setTimeout(() => Object.values(charts).forEach(c => { if(c) { c.resize(); c.update(); } }), 10);
            }
        }

        function filterData() {
            const t = document.getElementById('f-title').value.toLowerCase();
            const d = document.getElementById('f-director').value.toLowerCase();
            const y = document.getElementById('f-year').value;
            const c = document.getElementById('f-country').value;
            const mi = parseFloat(document.getElementById('f-slider-min').value), ma = parseFloat(document.getElementById('f-slider-max').value);

            filteredData = movieData.filter(m => 
                m.title.toLowerCase().includes(t) && m.director.toLowerCase().includes(d) &&
                (y === "" || m.release_year.toString() === y) && (c === "" || m.country === c) &&
                (m.box_office >= mi && m.box_office <= ma)
            );

            renderTable(); calculateMetrics(); updateCharts();
        }

        function calculateMetrics() {
            if (!filteredData.length) return;
            const vals = filteredData.map(m => m.box_office).sort((a,b) => a-b);
            const sum = vals.reduce((a, b) => a + b, 0);
            const fmt = (n) => '$' + n.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('m-sum').innerText = fmt(sum);
            document.getElementById('m-mean').innerText = fmt(sum/vals.length);
            document.getElementById('m-median').innerText = fmt(vals[Math.floor(vals.length/2)]);
            document.getElementById('m-max').innerText = fmt(vals[vals.length-1]);
            document.getElementById('m-count').innerText = vals.length;
        }

        function renderTable() {
            document.getElementById('tableBody').innerHTML = filteredData.map(m => `
                <tr><td style="width:25%">${m.title}</td><td style="width:10%">${m.release_year}</td><td style="width:20%">${m.director}</td>
                <td style="width:25%; color:var(--accent-blue);font-weight:bold">$${m.box_office.toLocaleString()}</td><td style="width:20%">${m.country}</td></tr>
            `).join('');
        }

        function sortTable(col) {
            currentSort.dir = (currentSort.col === col) ? currentSort.dir * -1 : 1; currentSort.col = col;
            filteredData.sort((a,b) => typeof a[col] === 'string' ? a[col].localeCompare(b[col]) * currentSort.dir : (a[col]-b[col]) * currentSort.dir);
            renderTable();
        }

        function handleSlider(type) {
            const sMin = document.getElementById('f-slider-min'), sMax = document.getElementById('f-slider-max');
            if (parseFloat(sMin.value) >= parseFloat(sMax.value)) {
                type === 'min' ? sMin.value = parseFloat(sMax.value) - 1 : sMax.value = parseFloat(sMin.value) + 1;
            }
            updateSliderLabels(); filterData();
        }

        function updateSliderLabels() {
            document.getElementById('v-min').innerText = '$' + parseInt(document.getElementById('f-slider-min').value).toLocaleString();
            document.getElementById('v-max').innerText = '$' + parseInt(document.getElementById('f-slider-max').value).toLocaleString();
        }

        function initCharts() {
            const commonPlugins = {
                datalabels: {
                    color: '#fff',
                    font: { weight: 'bold', size: 10 },
                    formatter: (value, context) => {
                        // For Bar/Line charts, we hide datalabels usually, or show on Pie
                        return context.chart.config.type === 'doughnut' ? (value > 0 ? value.toLocaleString() : '') : null;
                    }
                }
            };

            const opt = (t) => ({ 
                responsive: true,
                plugins: { 
                    ...commonPlugins,
                    datalabels: { display: false }, // Disable for Bar/Line by default
                    legend: { display: false }, 
                    title: { display: true, text: t, color: '#888' } 
                }, 
                scales: { y: { grid: { color: '#222' }, ticks: { color: '#666' } }, x: { ticks: { color: '#666' }, grid: { display: false } } } 
            });

            charts.bar = new Chart(document.getElementById('barChart'), { type: 'bar', data: { labels: [], datasets: [{ backgroundColor: '#00d4ff88', borderColor: '#00d4ff', borderWidth: 1 }] }, options: opt('Top 15 Revenue') });
            
            charts.pie = new Chart(document.getElementById('pieChart'), { 
                type: 'doughnut', 
                data: { labels: [], datasets: [{ backgroundColor: ['#00d4ff', '#0084ff', '#0044ff', '#00ccff', '#0055ff', '#00ffcc'], borderColor: '#111' }] }, 
                options: {
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            display: true,
                            anchor: 'center',
                            align: 'center',
                            backgroundColor: 'rgba(0,0,0,0.6)',
                            borderRadius: 3,
                            padding: 4,
                            formatter: (value, ctx) => {
                                const metric = document.getElementById('country-metric').value;
                                return metric === 'count' ? value : '$' + (value/1e6).toFixed(1) + 'M';
                            }
                        }
                    }
                }
            });

            charts.line = new Chart(document.getElementById('lineChart'), { type: 'line', data: { labels: [], datasets: [{ label: 'Releases', borderColor: '#00d4ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 212, 255, 0.1)' }] }, options: opt('Release Timeline') });
        }

        function updateCharts() {
            if (!charts.bar) return;
            const top = [...filteredData].sort((a,b) => b.box_office - a.box_office).slice(0, 15);
            charts.bar.data.labels = top.map(m => m.title);
            charts.bar.data.datasets[0].data = top.map(m => m.box_office);

            const mType = document.getElementById('country-metric').value;
            const groups = filteredData.reduce((acc, m) => { (acc[m.country] = acc[m.country] || []).push(m.box_office); return acc; }, {});
            const labels = Object.keys(groups);
            
            charts.pie.data.labels = labels;
            charts.pie.data.datasets[0].data = labels.map(c => {
                const v = groups[c].sort((a,b) => a-b);
                if (mType === 'count') return v.length;
                if (mType === 'avg') return v.reduce((a,b)=>a+b,0)/v.length;
                if (mType === 'min') return v[0];
                if (mType === 'max') return v[v.length-1];
                if (mType === 'median') return v[Math.floor(v.length/2)];
            });

            const years = filteredData.reduce((acc, m) => { acc[m.release_year] = (acc[m.release_year] || 0) + 1; return acc; }, {});
            const sY = Object.keys(years).sort();
            charts.line.data.labels = sY;
            charts.line.data.datasets[0].data = sY.map(y => years[y]);
            Object.values(charts).forEach(c => c.update());
        }

        window.onload = loadData;
    </script>
</body>
</html>
